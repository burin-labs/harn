name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  # sccache is wired in via .cargo/config.toml (rustc-wrapper = "sccache").
  # Incremental fights sccache — disable on CI so every rustc invocation is
  # eligible for cache hits.
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: make fmt-check

  lint-md:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0

  rust:
    name: Rust (lint + test + conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.9.1
        with:
          shared-key: workspace
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-nextest
      - run: make lint
      - run: make test
        env:
          NEXTEST_PROFILE: ci
      - run: make conformance
      - run: make lint-harn
      - run: make fmt-harn

  portal:
    name: Portal frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/harn-cli/portal/package-lock.json
      - run: npm ci
        working-directory: crates/harn-cli/portal
      - run: npm run lint
        working-directory: crates/harn-cli/portal
      - run: npm run build
        working-directory: crates/harn-cli/portal

  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [fmt, lint-md, rust, portal]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check for docs changes
        id: docs-changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BEFORE" HEAD | grep -q '^docs/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Render deploy
        if: steps.docs-changed.outputs.changed == 'true'
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
