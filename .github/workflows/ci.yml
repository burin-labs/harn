name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  # sccache is wired in via .cargo/config.toml (rustc-wrapper = "sccache").
  # Incremental fights sccache — disable on CI so every rustc invocation is
  # eligible for cache hits.
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"
  # Promote build warnings to errors so platform-specific warnings can't
  # silently accumulate (Windows-only deprecations, dead_code for cfg-gated
  # paths, etc). Clippy already runs with `-D warnings` via `make lint`;
  # this gates `cargo build` / `cargo check` the same way.
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: make fmt-check
      - name: Check stdlib mirror parity
        run: |
          for vm_file in crates/harn-vm/src/stdlib*.harn; do
            module_file="crates/harn-modules/src/stdlib/$(basename "$vm_file")"

            if [ ! -f "$module_file" ]; then
              echo "::error file=$vm_file::Missing stdlib mirror $module_file"
              exit 1
            fi

            if ! cmp -s "$vm_file" "$module_file"; then
              echo "::error file=$vm_file::Stdlib mirror drift: $vm_file must match $module_file byte-for-byte"
              echo "Run: cp \"$vm_file\" \"$module_file\""
              exit 1
            fi
          done

  lint-md:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0

  rust:
    name: Rust (lint + test + conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: workspace
      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        continue-on-error: true
        with:
          tool: nextest@0.9.133
      - run: make lint
      - run: make test
        env:
          NEXTEST_PROFILE: ci
      - run: make conformance
      - run: make protocol-conformance
      - run: make lint-harn
      - run: make fmt-harn
      # Audit gates promoted from release_gate.sh audit so a stale
      # generated artifact (highlight keywords, language-spec mirror,
      # trigger quickref, docs snippets, release metadata) fails the
      # PR instead of waiting until release time.
      - run: make check-highlight
      - run: make check-language-spec
      - run: make check-trigger-quickref
      - run: make check-trigger-examples
      - run: make check-docs-snippets
      - run: python3 scripts/verify_release_metadata.py

  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'conformance/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  windows:
    name: Rust on Windows (build + smoke test)
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: workspace-windows
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        continue-on-error: true
        with:
          tool: nextest@0.9.133
      # Don't gate the whole pipeline on the full Windows test surface yet —
      # this job exists to catch hard regressions (compile breaks, missing
      # cfg-gates, hardcoded `/bin/sh`, etc.). It compiles the whole workspace
      # test graph, then runs harn-lexer/parser/vm and adjacent core crate unit
      # tests plus a smoke `harn run`. Sandbox + signal-handler tests are
      # skipped automatically via existing `#![cfg(unix)]` gates.
      #
      # Keep the Rust work in one test-profile build. Mixing `cargo check`,
      # `cargo build`, and nextest made Windows recompile the same local crates
      # three times in separate artifact sets; `--workspace` preserves compile
      # coverage while the filter limits the tests that actually execute.
      - name: Compile workspace tests and run Windows unit slice
        shell: bash
        run: |
          windows_filter='package(harn-lexer) or package(harn-parser) or package(harn-vm) or package(harn-hostlib) or package(harn-fmt) or package(harn-lint) or package(harn-modules)'
          if command -v cargo-nextest >/dev/null 2>&1; then
            cargo nextest run --workspace -E "$windows_filter"
          else
            cargo test --workspace --no-run
            cargo test -p harn-lexer -p harn-parser -p harn-vm -p harn-hostlib -p harn-fmt -p harn-lint -p harn-modules
          fi
      - name: Smoke test harn run
        shell: bash
        run: |
          echo 'pipeline main() { println("ok") }' > smoke.harn
          ./target/debug/harn.exe run smoke.harn

  portal:
    name: Portal frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/harn-cli/portal/package-lock.json
      - run: npm ci
        working-directory: crates/harn-cli/portal
      - run: npm run lint
        working-directory: crates/harn-cli/portal
      - run: npm run build
        working-directory: crates/harn-cli/portal

  actions:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - run: make lint-actions

  check-status:
    name: Check status
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, lint-md, rust, windows, portal, actions]
    steps:
      - name: Verify required CI jobs
        run: |
          declare -A results=(
            ["Format check"]="${{ needs.fmt.result }}"
            ["Markdown lint"]="${{ needs['lint-md'].result }}"
            ["Rust (lint + test + conformance)"]="${{ needs.rust.result }}"
            ["Portal frontend"]="${{ needs.portal.result }}"
            ["GitHub Actions lint"]="${{ needs.actions.result }}"
          )

          # The Windows job is gated on `changes.outputs.rust` and is skipped
          # on PRs that don't touch Rust/CI. Treat `skipped` as passing here;
          # only an actual failure should fail the gate.
          windows_result="${{ needs.windows.result }}"
          echo "Rust on Windows (build + smoke test): $windows_result"
          if [ "$windows_result" != "success" ] && [ "$windows_result" != "skipped" ]; then
            echo "::error::Windows job failed."
            exit 1
          fi

          failed=0
          for name in "${!results[@]}"; do
            result="${results[$name]}"
            echo "$name: $result"
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          exit "$failed"

  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [check-status]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check for docs changes
        id: docs-changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BEFORE" HEAD | grep -q '^docs/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Render deploy
        if: steps.docs-changed.outputs.changed == 'true'
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
