name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  # sccache is wired in via .cargo/config.toml (rustc-wrapper = "sccache").
  # Incremental fights sccache — disable on CI so every rustc invocation is
  # eligible for cache hits.
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: make fmt-check
      - name: Check stdlib mirror parity
        run: |
          for vm_file in crates/harn-vm/src/stdlib*.harn; do
            module_file="crates/harn-modules/src/stdlib/$(basename "$vm_file")"

            if [ ! -f "$module_file" ]; then
              echo "::error file=$vm_file::Missing stdlib mirror $module_file"
              exit 1
            fi

            if ! cmp -s "$vm_file" "$module_file"; then
              echo "::error file=$vm_file::Stdlib mirror drift: $vm_file must match $module_file byte-for-byte"
              echo "Run: cp \"$vm_file\" \"$module_file\""
              exit 1
            fi
          done

  lint-md:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0

  rust:
    name: Rust (lint + test + conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.9.1
        with:
          shared-key: workspace
      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        continue-on-error: true
        with:
          tool: nextest@0.9.133
      - run: make lint
      - run: make test
        env:
          NEXTEST_PROFILE: ci
      - run: make conformance
      - run: make lint-harn
      - run: make fmt-harn

  windows:
    name: Rust on Windows (build + smoke test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.9.1
        with:
          shared-key: workspace-windows
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        continue-on-error: true
        with:
          tool: nextest@0.9.133
      # Don't gate the whole pipeline on the full Windows test surface yet —
      # this job exists to catch hard regressions (compile breaks, missing
      # cfg-gates, hardcoded `/bin/sh`, etc.). It runs harn-lexer/parser/vm
      # unit tests and a smoke `harn run`. Sandbox + signal-handler tests
      # are skipped automatically via existing `#![cfg(unix)]` gates.
      - name: Build workspace
        run: cargo build --workspace --tests --bin harn
      - name: Run unit tests for core crates
        shell: bash
        run: |
          if command -v cargo-nextest >/dev/null 2>&1; then
            cargo nextest run -p harn-lexer -p harn-parser -p harn-vm -p harn-fmt -p harn-lint -p harn-modules
          else
            cargo test -p harn-lexer -p harn-parser -p harn-vm -p harn-fmt -p harn-lint -p harn-modules
          fi
      - name: Smoke test harn run
        shell: bash
        run: |
          echo 'pipeline main() { println("ok") }' > smoke.harn
          ./target/debug/harn.exe run smoke.harn

  portal:
    name: Portal frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/harn-cli/portal/package-lock.json
      - run: npm ci
        working-directory: crates/harn-cli/portal
      - run: npm run lint
        working-directory: crates/harn-cli/portal
      - run: npm run build
        working-directory: crates/harn-cli/portal

  actions:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - run: make lint-actions

  check-status:
    name: Check status
    runs-on: ubuntu-latest
    if: always()
    needs: [fmt, lint-md, rust, windows, portal, actions]
    steps:
      - name: Verify required CI jobs
        run: |
          declare -A results=(
            ["Format check"]="${{ needs.fmt.result }}"
            ["Markdown lint"]="${{ needs['lint-md'].result }}"
            ["Rust (lint + test + conformance)"]="${{ needs.rust.result }}"
            ["Rust on Windows (build + smoke test)"]="${{ needs.windows.result }}"
            ["Portal frontend"]="${{ needs.portal.result }}"
            ["GitHub Actions lint"]="${{ needs.actions.result }}"
          )

          failed=0
          for name in "${!results[@]}"; do
            result="${results[$name]}"
            echo "$name: $result"
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          exit "$failed"

  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [check-status]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check for docs changes
        id: docs-changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BEFORE" HEAD | grep -q '^docs/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Render deploy
        if: steps.docs-changed.outputs.changed == 'true'
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
