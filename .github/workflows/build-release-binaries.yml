name: Build release binaries

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/**'
      - '.cargo/**'
      - 'rust-toolchain.toml'
      - 'Dockerfile'
      - '.github/workflows/build-release-binaries.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)release, e.g. v0.7.31. Required for workflow_dispatch.'
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: build-release-binaries-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  setup:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      is_release: ${{ steps.resolve.outputs.is_release }}
      version: ${{ steps.resolve.outputs.version }}
      major_minor: ${{ steps.resolve.outputs.major_minor }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release context
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          REF="${INPUT_TAG:-$REF_NAME}"
          IS_RELEASE=false
          if [[ -n "$INPUT_TAG" || "$REF_TYPE" == "tag" ]]; then
            IS_RELEASE=true
            if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::expected tag of form vX.Y.Z, got '$REF'"
              exit 1
            fi
            VERSION="${REF#v}"
          else
            VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          MAJOR_MINOR="$(echo "$VERSION" | awk -F. '{print $1"."$2}')"
          {
            echo "ref=$REF"
            echo "is_release=$IS_RELEASE"
            echo "version=$VERSION"
            echo "major_minor=$MAJOR_MINOR"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: stable

      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Add cross-compile target to pinned toolchain
        run: |
          # rust-toolchain.toml pins the channel; `rustup show` triggers install
          # of the pinned toolchain, then we add the matrix target to it.
          rustup show active-toolchain || rustup show
          rustup target add ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # Scope the compile-time optimization tradeoff to release CI only.
          CARGO_PROFILE_RELEASE_LTO: thin
        run: cargo build --release -p harn-cli -p harn-dap -p harn-lsp --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/harn dist/harn
          cp target/${{ matrix.target }}/release/harn-dap dist/harn-dap
          cp target/${{ matrix.target }}/release/harn-lsp dist/harn-lsp
          cd dist
          tar czf harn-${{ matrix.target }}.tar.gz harn harn-dap harn-lsp

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/harn.exe dist/harn.exe
          cp target/${{ matrix.target }}/release/harn-dap.exe dist/harn-dap.exe
          cp target/${{ matrix.target }}/release/harn-lsp.exe dist/harn-lsp.exe
          cd dist
          7z a "harn-${{ matrix.target }}.zip" harn.exe harn-dap.exe harn-lsp.exe

      - name: Upload artifact (unix)
        if: needs.setup.outputs.is_release == 'true' && runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harn-${{ matrix.target }}
          path: dist/harn-${{ matrix.target }}.tar.gz

      - name: Upload artifact (windows)
        if: needs.setup.outputs.is_release == 'true' && runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harn-${{ matrix.target }}
          path: dist/harn-${{ matrix.target }}.zip

  container:
    name: Publish container
    needs: [setup, build]
    if: needs.setup.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/burin-labs/harn
          # Use raw tags computed from the resolved version so the
          # workflow can publish for an explicit input.tag (recovery
          # path) just as well as for an auto-fired tag push. The
          # semver type=match,pattern=... approach only works when the
          # workflow itself was triggered by a tag push, which the
          # recovery / re-release path isn't.
          tags: |
            type=raw,value=${{ needs.setup.outputs.version }}
            type=raw,value=${{ needs.setup.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub release
    needs: [setup, build, container]
    if: needs.setup.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: harn-*
          merge-multiple: true

      - name: Render release notes from changelog
        run: |
          python3 scripts/render_release_notes.py \
            --version "${{ needs.setup.outputs.version }}" \
            --output release-notes.md

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.setup.outputs.ref }}
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
