# cargo-nextest configuration for the Harn workspace.
#
# Run with `cargo nextest run --workspace` after `cargo install cargo-nextest --locked`.
# Nextest is optional; plain `cargo test` also works but does not enforce
# the slow-test timeouts below. The goal of this file is to guarantee that
# no single test can wedge the suite indefinitely (historically, tests that
# bound a `TcpListener` in blocking mode have hung CI for many minutes).

[profile.default]
# Any test that runs longer than 15s is considered "slow"; if it exceeds
# the 60s hard cap three times it is terminated so the suite keeps moving.
slow-timeout = { period = "15s", terminate-after = 4, grace-period = "5s" }
# Nextest's upstream default FD-leak grace period is 200ms. Under full
# workspace fan-out, fast Rust tests in the largest binaries can take longer
# than that to close captured stdout/stderr after libtest reports success,
# which creates noisy "passed (leaky)" results attributed to whichever fast
# test happened to finish at the wrong moment. Keep this short enough to catch
# real leaked subprocesses, but make leaks fail so they are fixed instead of
# silently accepted.
leak-timeout = { period = "2s", result = "fail" }
# Terminate runaway tests after 60 seconds by default. Tests that legitimately
# need more time must opt in via an override below.
fail-fast = false

# CI profile is stricter: one warning at 30s, hard kill at 120s.
[profile.ci]
slow-timeout = { period = "30s", terminate-after = 4, grace-period = "10s" }
leak-timeout = { period = "2s", result = "fail" }
fail-fast = false
failure-output = "immediate-final"
success-output = "never"

# Tests that spawn the `harn` debug binary as a subprocess used to need a
# bounded `max-threads = 4` cap to avoid macOS dyld + AMFI cold-cache
# scheduler starvation: when N tests simultaneously cold-spawn the
# freshly-built binary, the kernel page-ins, dyld closure construction,
# and AMFI signature validation contend on the same shared resources, and
# every individual subprocess startup balloons from ~300 ms to several
# seconds — the tail of that cohort then trips the 60 s slow-test ceiling.
#
# That cap was a workaround, not a fix. As of harn#949 the architectural
# fix is in place: every harn-cli subprocess test spawns through
# `crates/harn-cli/tests/test_util/process.rs::harn_command()`, which
# pre-warms the binary's dyld page cache and AMFI signature with a single
# synchronous `harn --version` invocation on first call within each test
# binary process. Subsequent spawns short-circuit the cold-cache path
# entirely, so wall-clock parallelism is no longer bounded by
# shared-OS-resource contention.
#
# That fix lifts the cold-cache wall but does not remove the second,
# softer constraint: several orchestrator integration tests (e.g.
# `bounded_pump_drain_truncates_and_replays_remaining_backlog_after_restart`)
# spawn an orchestrator subprocess and then assert that 60+ events
# dispatch within `EVENT_FAIL_FAST_TIMEOUT` (10 s, see
# `tests/test_util/timing.rs`). Under nextest's full workspace fan-out
# every additional concurrent subprocess steals CPU from the in-flight
# dispatcher, so at high concurrency the dispatch budget itself starts
# tipping over.
#
# 8 is the sweet spot empirically: double the previous ceiling, no
# regression in 5x stress runs (`scripts/stress_subprocess_tests.sh`),
# and leaves enough CPU headroom for the time-sensitive dispatcher
# assertions to stay well within budget. Push higher only after relaxing
# `EVENT_FAIL_FAST_TIMEOUT` — the limiter becomes the test, not the
# scheduler.
[test-groups]
harn-subprocess = { max-threads = 8 }
harn-cli-bin = { max-threads = 8 }
# harn-dap's unit tests are short, but several construct debugger VMs,
# Tokio runtimes, and host-bridge state. Under full workspace fan-out on
# macOS, that binary can report a passed test as "leaky" while teardown is
# delayed by neighboring DAP tests. Keep leak failures enabled and remove
# the concurrency pressure instead.
harn-dap = { max-threads = 1 }

# Transport-layer LLM tests do real localhost TCP with a 3s accept deadline.
# They're bounded internally but give them a bit more room than the default
# slow-test threshold to reduce false-positive flags on cold CI workers.
[[profile.default.overrides]]
filter = 'package(harn-vm) and test(/llm::api::tests/)'
slow-timeout = { period = "30s", terminate-after = 3, grace-period = "5s" }

[[profile.ci.overrides]]
filter = 'package(harn-vm) and test(/llm::api::tests/)'
slow-timeout = { period = "60s", terminate-after = 3, grace-period = "10s" }

# Bound parallelism for any harn-cli integration test that spawns the
# `harn` debug binary as a subprocess. See the `[test-groups]` block
# above for rationale.
[[profile.default.overrides]]
filter = "package(harn-cli) and kind(test)"
test-group = "harn-subprocess"

[[profile.default.overrides]]
filter = "package(harn-cli) and binary(harn)"
test-group = "harn-cli-bin"

[[profile.default.overrides]]
filter = "package(harn-dap)"
test-group = "harn-dap"

[[profile.ci.overrides]]
filter = "package(harn-cli) and kind(test)"
test-group = "harn-subprocess"

[[profile.ci.overrides]]
filter = "package(harn-cli) and binary(harn)"
test-group = "harn-cli-bin"

[[profile.ci.overrides]]
filter = "package(harn-dap)"
test-group = "harn-dap"
