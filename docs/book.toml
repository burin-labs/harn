[book]
title = "Harn Documentation"
description = "The pipeline-oriented language for AI agent orchestration"
authors = ["Burin Labs"]
language = "en"
src = "src"

[build]
build-dir = "dist"

[output.html]
git-repository-url = "https://github.com/burin-labs/harn"
edit-url-template = "https://github.com/burin-labs/harn/edit/main/docs/src/{path}"
no-section-label = true
# Harn syntax highlighting. harn-keywords.js is generated by
# `harn dump-highlight-keywords` (make gen-highlight); harn-hljs.js
# consumes it and registers the language with the bundled highlight.js.
# Order matters — the keyword file must load before the language module.
additional-js = ["theme/harn-keywords.js", "theme/harn-hljs.js"]
