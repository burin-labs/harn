[package]
name = "harn-vm"
version.workspace = true
edition.workspace = true

[dependencies]
harn-lexer = { path = "../harn-lexer" }
harn-parser = { path = "../harn-parser" }
regex = "1"
serde_json = "1"
rand = "0.8"
tokio = { version = "1", features = ["rt", "sync", "time"] }
reqwest = { version = "0.12", features = ["json"] }
reqwest-eventsource = "0.6"
tokio-stream = "0.1"
base64 = "0.22"
