[package]
name = "harn-vm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Async bytecode virtual machine for the Harn programming language"

[dependencies]
harn-lexer = { path = "../harn-lexer", version = "0.4" }
harn-parser = { path = "../harn-parser", version = "0.4" }
regex = "1"
serde_json = "1"
rand = "0.8"
tokio = { version = "1", features = ["rt", "sync", "time", "process", "io-util", "io-std"] }
reqwest = { version = "0.12", features = ["json"] }
reqwest-eventsource = "0.6"
tokio-stream = "0.1"
base64 = "0.22"
sha2 = "0.10"
md-5 = "0.10"
