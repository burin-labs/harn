<!DOCTYPE html>
<html>
<head>
  <title>Harn Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; background: #16213e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 20px; font-weight: 600; color: #f0f0f0; }
    header button { padding: 8px 20px; background: #0f3460; color: #e0e0e0; border: 1px solid #555; border-radius: 6px; cursor: pointer; font-size: 14px; }
    header button:hover { background: #1a4a7a; }
    .panels { display: flex; flex: 1; overflow: hidden; }
    .panel { flex: 1; display: flex; flex-direction: column; }
    .panel:first-child { border-right: 1px solid #333; }
    .panel-header { padding: 8px 16px; background: #16213e; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    textarea { flex: 1; background: #0f0f23; color: #e0e0e0; border: none; padding: 16px; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; font-size: 14px; line-height: 1.6; resize: none; outline: none; tab-size: 2; }
    #output { flex: 1; background: #0f0f23; color: #c0c0c0; padding: 16px; font-family: monospace; font-size: 14px; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <header>
    <h1>Harn Playground</h1>
    <button onclick="run()">Run (Ctrl+Enter)</button>
  </header>
  <div class="panels">
    <div class="panel">
      <div class="panel-header">Source</div>
      <textarea id="editor" spellcheck="false">pipeline default(task) {
  log("Hello, Harn!")

  let nums = [1, 2, 3, 4, 5]
  let doubled = nums.map({ x -> x * 2 })
  log("Doubled: ${doubled}")

  fn fib(n) {
    if n <= 1 { return n }
    return fib(n - 1) + fib(n - 2)
  }

  for i in [0, 1, 2, 3, 4, 5, 6, 7] {
    log("fib(${i}) = ${fib(i)}")
  }
}</textarea>
    </div>
    <div class="panel">
      <div class="panel-header">Output</div>
      <div id="output"></div>
    </div>
  </div>

  <script type="module">
    import init, { execute } from './pkg/harn_wasm.js';

    await init();

    window.run = function() {
      const source = document.getElementById('editor').value;
      const output = document.getElementById('output');
      try {
        const result = execute(source);
        output.textContent = result;
        output.className = '';
      } catch (e) {
        output.textContent = e.message || e.toString();
        output.className = 'error';
      }
    };

    document.getElementById('editor').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        window.run();
      }
      // Tab support
      if (e.key === 'Tab') {
        e.preventDefault();
        const t = e.target;
        const start = t.selectionStart;
        t.value = t.value.substring(0, start) + '  ' + t.value.substring(t.selectionEnd);
        t.selectionStart = t.selectionEnd = start + 2;
      }
    });

    // Run on load
    window.run();
  </script>
</body>
</html>
